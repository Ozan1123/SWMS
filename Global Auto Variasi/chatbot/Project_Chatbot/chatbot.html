<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Global Auto Variasi - Chatbot</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <div class="page">
    <div class="chat-window">
      <div class="topbar">
        <div class="bot-avatar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/>
            <path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/>
          </svg>
        </div>
        <div class="topbar-info">
          <div class="topbar-name">Global Auto Variasi Chatbot</div>
          <div class="topbar-status">
            <span class="online-dot"></span> Online sekarang
          </div>
        </div>
        <button class="icon-btn back-btn" onclick="goBackIndex()" title="Kembali ke halaman utama">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <button class="icon-btn" onclick="clearChat()" title="Hapus chat & reset sesi">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </div>

      <div id="chatBox"></div>

      <div class="input-bar">
        <input
          class="input-box"
          id="inputMsg"
          placeholder="Tulis pesan..."
          onkeydown="handleKey(event)"
          autocomplete="off"
        />
        <button class="send-btn" onclick="sendMsg()" title="Kirim">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>

    // Membuat ID unik untuk setiap user jika belum ada
if (!sessionStorage.getItem("chat_session_id")) {
    sessionStorage.setItem("chat_session_id", "user_" + Math.random().toString(36).substring(7));
}
const mySessionId = sessionStorage.getItem("chat_session_id");
const API_URL = "http://localhost:3000/chat";

// Saat fetch ke /chat, kirimkan sessionId ini
async function sendMessage() {
    const message = document.getElementById("userInput").value;
    
    const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ 
            message: message, 
            sessionId: mySessionId // <--- WAJIB KIRIM INI
        })
    });
    
}



    const chatBox = document.getElementById("chatBox");
    
    // GENERATE ATAU AMBIL SESSION ID (Agar chat tidak tertukar dengan orang lain)
    let sessionId = sessionStorage.getItem("ga_session_id");
    if (!sessionId) {
      sessionId = "sess_" + Math.random().toString(36).substr(2, 9);
      sessionStorage.setItem("ga_session_id", sessionId);
    }

    function getTime() {
      return new Date().toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" });
    }

    function addMsg(html, sender) {
      const row = document.createElement("div");
      row.className = "msg-row " + sender + " msg-in";

      const wrap = document.createElement("div");
      wrap.className = "msg-wrap";

      const bub = document.createElement("div");
      bub.className = "bubble " + sender;
      bub.innerHTML = html;

      const t = document.createElement("div");
      t.className = "msg-time";
      t.textContent = getTime();

      wrap.appendChild(bub);
      wrap.appendChild(t);

      if (sender === "bot") {
        const av = document.createElement("div");
        av.className = "msg-avatar bot-av";
        av.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/></svg>`;
        row.appendChild(av);
        row.appendChild(wrap);
      } else {
        const av = document.createElement("div");
        av.className = "msg-avatar user-av";
        av.textContent = "User";
        row.appendChild(wrap);
        row.appendChild(av);
      }

      chatBox.appendChild(row);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showTyping() {
      const row = document.createElement("div");
      row.className = "msg-row bot msg-in";
      row.id = "typing";
      row.innerHTML = `<div class="msg-avatar bot-av"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/></svg></div><div class="typing-bub"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
      chatBox.appendChild(row);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById("typing");
      if (t) t.remove();
    }

    async function sendMsg() {
      const input = document.getElementById("inputMsg");
      const msg = input.value.trim();
      if (!msg) return;

      addMsg(msg, "user");
      input.value = "";
      showTyping();

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ 
            message: msg,
            sessionId: sessionId // MENGIRIM ID KE SERVER
          })
        });

        const data = await res.json();
        removeTyping();
        
        // Ubah newline dari AI menjadi <br> agar rapi di HTML
        const formattedReply = data.reply.replace(/\n/g, "<br>");
        addMsg(formattedReply, "bot");

      } catch (err) {
        removeTyping();
        addMsg("Server chat belum bisa merespon. coba lagi nanti.", "bot");
      }
    }

    function handleKey(e) {
      if (e.key === "Enter") sendMsg();
    }

    function clearChat() {
      if(confirm("Hapus semua percakapan dan reset data mobil?")) {
        chatBox.innerHTML = "";
        // RESET SESSION ID (Ini akan membuat server menganggap kamu user baru)
        sessionId = "sess_" + Math.random().toString(36).substr(2, 9);
        localStorage.setItem("ga_session_id", sessionId);
        
        addMsg("<p>Halo! Sesi telah direset. 👋</p><p>Silakan beri tahu kami jenis mobil Anda untuk memulai kembali.</p>", "bot");
      }
    }

    function goBackIndex() {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = "../../index.html";
      }
    }

    window.onload = () => {
      addMsg("<p>Halo! 👋 Selamat datang di <b>Global Auto Variasi</b>.</p><p>Silakan beri kami pertanyaan atau informasi yang Anda butuhkan.</p>", "bot");
    };
  </script>
</body>
</html>
